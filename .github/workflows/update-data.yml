# ─── 每日自動更新 MPF 基金數據 ────────────────────────────────────────────────
#
# 運作流程：
# 1. 每天香港時間 08:00（UTC 00:00）自動觸發
# 2. 執行 scripts/fetch_mpfa.py 從 MPFA 網站抓取最新回報數據
# 3. 如果 public/data/funds.json 有變化，自動 commit + push
# 4. Vercel 偵測到新 commit 後自動重新部署（更新靜態資源）

name: 每日更新 MPF 基金數據

on:
  schedule:
    - cron: "0 0 * * 1-5"   # 週一至週五 UTC 00:00 = 香港時間 08:00
  workflow_dispatch:         # 允許手動在 GitHub Actions 頁面觸發

jobs:
  update-fund-data:
    name: 抓取並更新基金數據
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # 需要 write 權限才能 push commit

    steps:
      # ─── 1. 取出程式碼 ────────────────────────────────────────────────────
      - name: 📥 取出最新程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── 2. 設定 Python 3.11 ──────────────────────────────────────────────
      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ─── 3. 安裝 Python 依賴 ──────────────────────────────────────────────
      - name: 📦 安裝爬蟲依賴
        run: pip install -r requirements.txt

      # ─── 4. 執行爬蟲（輸出到 public/data/funds.json） ────────────────────
      - name: 🕷️ 抓取 MPFA 基金數據
        run: python3 scripts/fetch_mpfa.py

      # ─── 5. 顯示更新摘要 ──────────────────────────────────────────────────
      - name: 📊 顯示更新摘要
        run: |
          python3 -c "
          import json
          with open('public/data/funds.json', encoding='utf-8') as f:
              d = json.load(f)
          print('=== 數據更新摘要 ===')
          print('更新時間:', d.get('lastUpdatedHKT', 'N/A'))
          print('數據來源:', d.get('dataSource', 'N/A'))
          print('基金數量:', d.get('totalFunds', 'N/A'))
          "

      # ─── 6. 檢查 public/data/funds.json 是否有變化 ───────────────────────
      - name: 🔍 檢查數據是否更新
        id: check
        run: |
          if git diff --quiet public/data/funds.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📌 數據無變化，跳過 commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 數據有更新，準備 commit"
          fi

      # ─── 7. Commit + Push ─────────────────────────────────────────────────
      - name: 💾 Commit 並推送更新數據
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          UPDATE_TIME=$(python3 -c "
          from datetime import datetime, timezone, timedelta
          hkt = datetime.now(timezone(timedelta(hours=8)))
          print(hkt.strftime('%Y-%m-%d %H:%M HKT'))
          ")

          DATA_SOURCE=$(python3 -c "
          import json
          with open('public/data/funds.json', encoding='utf-8') as f:
              d = json.load(f)
          src = d.get('dataSource', 'unknown')
          print('MPFA即時' if src == 'mpfa' else 'MPFA部分' if 'partial' in src else '備用')
          ")

          git add public/data/funds.json
          git commit -m "data: 更新 MPF 基金數據 [${UPDATE_TIME}] (${DATA_SOURCE})"
          git push

      # ─── 8. （選用）觸發 Vercel Deploy Hook ──────────────────────────────
      - name: 🚀 通知 Vercel 重新部署
        if: steps.check.outputs.changed == 'true' && secrets.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✅ 已觸發 Vercel 重新部署"

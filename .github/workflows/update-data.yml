name: Update MPF Fund Data

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch MPFA data
        run: python3 scripts/fetch_mpfa.py --debug-html public/data/debug_page.txt

      - name: Show result
        run: |
          python3 -c "
          import json
          with open('public/data/funds.json') as f:
              d = json.load(f)
          src = d.get('dataSource', 'unknown')
          print('=== Scraper Result ===')
          print('dataSource :', src)
          print('totalFunds :', d.get('totalFunds', 0))
          print('lastUpdated:', d.get('lastUpdatedHKT', d.get('lastUpdated', 'N/A')))
          print('note       :', d.get('note', ''))
          if 'mpfa' in src:
              print()
              print('SUCCESS: Real MPFA data fetched!')
              print('Top 5 funds by 1-year return:')
              for f in d['funds'][:5]:
                  r = f['returns']
                  print(f'  {f[\"name\"][:40]:40s} | 1Y: {r[\"oneYear\"]:6.2f}%  5Y: {r[\"fiveYears\"]:7.2f}%')
          else:
              print('WARNING: unexpected dataSource:', src)
          "

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json public/data/debug_page.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes, skipping commit"
          else
            git commit -m "data: update MPF fund data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Data updated and pushed"
          fi

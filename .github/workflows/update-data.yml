name: Update MPF Fund Data

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 18:00 HKT (UTC+8) on weekdays
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch MPFA fund data
        run: python3 scripts/fetch_mpfa.py --debug-html public/data/debug_page.txt

      - name: Show result
        run: |
          python3 -c "
          import json
          with open('public/data/funds.json') as f:
              d = json.load(f)
          print('totalFunds :', len(d.get('funds',[])))
          print('lastUpdated:', d.get('lastUpdatedHKT', 'N/A'))
          print('note       :', d.get('note', ''))
          print()
          print('Top 5 funds (2025 / 2024 / 2023 / 3Y / 5Y):')
          for f in d['funds'][:5]:
              r = f['returns']
              print(f'  {f[\"name\"][:35]:35s} | 2025:{r[\"year2025\"]:6.2f}% 2024:{r[\"year2024\"]:6.2f}% 2023:{r[\"year2023\"]:6.2f}% 3Y:{r[\"threeYears\"]:6.2f}% 5Y:{r[\"fiveYears\"]:6.2f}%')
          "

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json public/data/debug_page.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes, skipping commit"
          else
            git commit -m "data: update MPF fund data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Data updated and pushed"
          fi

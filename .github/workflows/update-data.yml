name: Update MPF Fund Data

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch MPFA data
        run: python3 scripts/fetch_mpfa.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json
          if git diff --staged --quiet; then
            echo "No data changes, skipping commit"
          else
            git commit -m "data: update MPF fund data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Data updated and pushed"
          fi
